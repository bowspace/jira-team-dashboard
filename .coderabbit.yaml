language: "en"
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  path_filters:
    - "!dist/**"
    - "!node_modules/**"
    - "!package-lock.json"
  auto_review:
    enabled: true
    drafts: false
chat:
  auto_reply: true
